<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Panel Estudiante</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

.comentarios{
margin-top:15px;
border-top:1px solid rgba(0,0,0,0.2);
padding-top:10px;
}

.comentario{
background:#f1f3f8;
padding:8px;
border-radius:8px;
margin-bottom:6px;
font-size:14px;
}

#nombreUsuario{
color:white;
font-weight:bold;
flex-grow:1;
text-align:center;
font-size:18px;
}

</style>

</head>

<body class="estudiante-bg">

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid d-flex align-items-center">

<span class="navbar-brand">
<i class="fa-solid fa-user-graduate"></i>
Panel Estudiante
</span>

<div id="nombreUsuario"></div>

<button class="btn btn-light" onclick="logout()">
Cerrar sesión
</button>

</div>

</nav>

<div class="container mt-4">

<h3>📚 Tutorías disponibles</h3>

<div id="listaTutorias" class="row"></div>

</div>

<script>

function formatearFecha(fecha){
let f = new Date(fecha)
return f.toLocaleDateString("es-CO")
}

function formatearHora(hora){
let h = new Date("1970-01-01T"+hora)
return h.toLocaleTimeString("es-CO",{hour:"numeric",minute:"2-digit"})
}

function logout(){
window.location.href="/"
}

function cargarUsuario(){

fetch("/usuarioActual")
.then(res=>res.json())
.then(data=>{

if(data.nombre){
document.getElementById("nombreUsuario").innerHTML="👤 "+data.nombre
}

})

}

function cargarTutorias(){

fetch("/tutorias")
.then(res=>res.json())
.then(data=>{

const cont=document.getElementById("listaTutorias")
cont.innerHTML=""

data.forEach(t=>{

let comentariosHTML=""

if(t.comentarios && t.comentarios.length>0){

t.comentarios.forEach(c=>{

comentariosHTML+=`
<div class="comentario">
<b>${c.usuario}</b>: ${c.texto}
</div>
`

})

}else{
comentariosHTML="<small>Sin comentarios</small>"
}

cont.innerHTML+=`

<div class="col-md-4 mb-3">

<div class="card shadow-sm">

<div class="card-body">

<h5>${t.materia}</h5>

<p>
<b>👨‍🏫 Docente:</b> ${t.docente}<br>
<b>🏫 Salón:</b> ${t.salon}<br>
<b>📅 Fecha:</b> ${formatearFecha(t.fecha)}<br>
<b>⏰ Hora:</b> ${formatearHora(t.hora)}<br>
<b>📘 Modalidad:</b> ${t.tipo}
</p>

<button class="btn btn-success w-100 mb-2" onclick="reservar(${t.id})">
Reservar tutoría
</button>

<button class="btn btn-primary w-100 mb-2" onclick="comentario(${t.id})">
Enviar comentario
</button>

<div class="comentarios">

<h6>Comentarios</h6>

${comentariosHTML}

</div>

</div>
</div>
</div>
`

})

})

}

function reservar(id){

fetch("/reservar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tutoria_id:id,
comentario:""
})
})
.then(res=>res.json())
.then(data=>{
Swal.fire("Reservado","Tutoría reservada","success")
cargarTutorias()
})

}

function comentario(id){

Swal.fire({
title:"Enviar comentario",
input:"text",
inputPlaceholder:"Escribe tu comentario",
showCancelButton:true
}).then(result=>{

if(result.isConfirmed){

if(result.value.trim()===""){
Swal.fire("Error","Debes escribir un comentario","error")
return
}

fetch("/reservar",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
tutoria_id:id,
comentario:result.value
})
})
.then(res=>res.json())
.then(data=>{
Swal.fire("Comentario enviado","","success")
cargarTutorias()
})

}

})

}

cargarUsuario()
cargarTutorias()

</script>

</body>
</html>
