<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Sistema de Tutorías</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- BOOTSTRAP -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ANIMATE -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<!-- SWEET ALERT -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
font-family:'Poppins',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("img/fondo-uts.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

}

.login-card{
width:400px;
padding:40px;
border-radius:15px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
font-size:28px;
font-weight:600;
text-align:center;
margin-bottom:20px;
color:#2563eb;
}

.form-control{
border-radius:10px;
}

.btn-login{
border-radius:10px;
font-weight:500;
}

</style>

</head>

<body>

<div class="login-card animate__animated animate__fadeInDown">

<div class="logo">
    <img src="img/logo-uts.png" alt="Logo UTS" style="width: 40px; vertical-align: middle; margin-right: 10px;">
    Sistema de Tutorías
</div>
<!-- LOGIN -->

<div class="mb-3">
<label>Usuario</label>
<input id="usuario" class="form-control" placeholder="Ingrese usuario">
</div>

<div class="mb-3">
<label>Contraseña</label>
<input id="password" type="password" class="form-control" placeholder="Ingrese contraseña">
</div>

<button class="btn btn-primary w-100 btn-login" onclick="login()">
<i class="fa-solid fa-right-to-bracket"></i>
Ingresar
</button>

<hr>

<h6 class="text-center">Crear cuenta</h6>

<!-- REGISTRO -->

<div class="mb-2">
<input id="nuevoUsuario" class="form-control" placeholder="Nuevo usuario">
</div>

<div class="mb-2">
<input id="nuevoPass" type="password" class="form-control" placeholder="Contraseña">
</div>

<select id="nuevoRol" class="form-control mb-3">
<option value="estudiante">Estudiante</option>
<option value="docente">Docente</option>
</select>

<button class="btn btn-success w-100" onclick="registrar()">
<i class="fa-solid fa-user-plus"></i>
Crear cuenta
</button>

</div>

<script>

/* ================= LOGIN ================= */

function login(){

const usuario=document.getElementById("usuario").value
const password=document.getElementById("password").value

if(usuario==="" || password===""){

Swal.fire(
'Error',
'Debes ingresar usuario y contraseña',
'warning'
)

return
}

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
usuario:usuario,
password:password
})

})

.then(res=>res.json())

.then(data=>{

if(data.error){

Swal.fire(
'Error',
data.error,
'error'
)

return
}

localStorage.setItem("usuario",usuario)
localStorage.setItem("id",data.id)
localStorage.setItem("rol",data.rol)

if(data.rol==="estudiante"){
window.location="/estudiante.html"
}

if(data.rol==="docente"){
window.location="/docente.html"
}

if(data.rol==="admin"){
window.location="/admin.html"
}

})

}

/* ================= REGISTRAR ================= */

function registrar(){

const usuario=document.getElementById("nuevoUsuario").value
const password=document.getElementById("nuevoPass").value
const rol=document.getElementById("nuevoRol").value

if(usuario==="" || password===""){

Swal.fire(
'Error',
'Debes llenar todos los campos',
'warning'
)

return
}

fetch("/registro",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
usuario:usuario,
password:password,
rol:rol
})

})

.then(res=>res.json())

.then(data=>{

if(data.error){

Swal.fire(
'Error',
data.error,
'error'
)

return
}

Swal.fire(
'Usuario creado',
'Ahora puedes iniciar sesión',
'success'
)

document.getElementById("nuevoUsuario").value=""
document.getElementById("nuevoPass").value=""

})

}

</script>

</body>
</html>
