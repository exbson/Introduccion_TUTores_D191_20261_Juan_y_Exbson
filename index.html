<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TutorConnect</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="main-container">

<!-- LOGIN / REGISTRO -->

<div id="view-auth" class="card">

<h1 class="title">TutorConnect</h1>

<h2 id="auth-title">Iniciar sesión</h2>

<div id="login-form">

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()" class="btn-primary">
Entrar
</button>

<p class="link" onclick="toggleAuth(true)">
Crear cuenta
</p>

</div>

<div id="register-form" class="hidden">

<input id="reg-user" placeholder="Usuario">
<input id="reg-pass" type="password" placeholder="Contraseña">

<select id="reg-rol">
<option value="estudiante">Estudiante</option>
<option value="docente">Docente</option>
</select>

<button onclick="registrar()" class="btn-success">
Registrarse
</button>

<p class="link" onclick="toggleAuth(false)">
Volver
</p>

</div>

</div>

<!-- DASHBOARD -->

<div id="view-dash" class="card hidden">

<div class="header">

<div>
<h2 id="user-display"></h2>
<span id="role-tag"></span>
</div>

<button onclick="logout()" class="btn-danger">
Cerrar sesión
</button>

</div>

<div id="content"></div>

</div>

</div>

<script src="/js/app.js"></script>

</body>
</html>
