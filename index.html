<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TutorConnect Pro | Sistema de Tutorías</title>
    <style>
        :root { 
            --p: #79b929; 
            --danger: #ef4444; 
            --success: #10b981; 
            --bg: #1a1a1a; 
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('fondo-uts.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }

        .card { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 2.5rem; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 600px; 
        }

        .hidden { display: none; }
        
        input, select { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
        }

        button { 
            padding: 12px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            width: 100%; 
        }

        button:hover { 
            opacity: 0.9; 
            transform: translateY(-1px); 
        }
        
        .item { 
            border: 1px solid #e2e8f0; 
            padding: 15px; 
            margin: 15px 0; 
            border-radius: 10px; 
            background: #fff; 
        }

        .tag { 
            font-size: 0.75rem; 
            padding: 4px 8px; 
            border-radius: 20px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        .header-dash { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 15px; 
            margin-bottom: 20px; 
        }
        
        .tutoria-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            font-size: 0.9rem; 
            margin: 10px 0; 
        }
    </style>
</head>
<body>

<div id="view-auth" class="card">
    <h1 style="text-align: center; color: var(--p);">🎓 TutorConnect</h1>
    <h2 id="auth-title" style="text-align: center;">Iniciar Sesión</h2>
    
    <div id="login-form">
        <input type="text" id="user" placeholder="Nombre de usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button style="background: var(--p); color: white;" onclick="login()">Entrar</button>
        <p onclick="toggleAuth(true)" style="cursor:pointer; color: var(--p); text-align:center;">
            ¿Eres nuevo? Crear cuenta
        </p>
    </div>

    <div id="register-form" class="hidden">
        <input type="text" id="reg-user" placeholder="Nombre completo">
        <input type="password" id="reg-pass" placeholder="Crea una contraseña">
        <select id="reg-rol">
            <option value="estudiante">Estudiante</option>
            <option value="docente">Docente</option>
            <option value="administrador">Administrador</option>
        </select>
        <button style="background: var(--success); color: white;" onclick="registrar()">Registrarse</button>
        <p onclick="toggleAuth(false)" style="cursor:pointer; text-align:center;">
            Volver al login
        </p>
    </div>
</div>

<div id="view-dash" class="card hidden">
    <div class="header-dash">
        <div>
            <h2 id="user-display" style="margin: 0; color: var(--p);"></h2>
            <span id="role-tag" class="tag"></span>
        </div>
        <button onclick="location.reload()" 
            style="width:auto; background:var(--danger); color:white;">
            Cerrar Sesión
        </button>
    </div>
    <div id="content"></div>
</div>

<script>
let currentUser = null;

function toggleAuth(isReg) {
    document.getElementById('login-form').classList.toggle('hidden', isReg);
    document.getElementById('register-form').classList.toggle('hidden', !isReg);
    document.getElementById('auth-title').innerText = isReg ? "Registro" : "Iniciar Sesión";
}

async function login() {
    const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            nombre:user.value,
            pass:pass.value
        })
    });

    if(res.ok){
        const data = await res.json();
        currentUser = data.user;
        showDash();
    } else alert("Datos incorrectos");
}

async function registrar(){
    await fetch('/api/registro',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            nombre:reg-user.value,
            pass:reg-pass.value,
            rol:reg-rol.value
        })
    });
    alert("Cuenta creada");
    toggleAuth(false);
}

function showDash(){
    view-auth.classList.add('hidden');
    view-dash.classList.remove('hidden');
    user-display.innerText = "Hola, " + currentUser.nombre;
    role-tag.innerText = currentUser.rol.toUpperCase();
    renderContent();
}

async function renderContent(){
    const container = document.getElementById('content');
    container.innerHTML="";

    if(currentUser.rol==='administrador'){
        container.innerHTML="<h3>Panel Administración</h3>";

        const res=await fetch('/api/usuarios');
        const users=await res.json();

        users.forEach(u=>{
            container.innerHTML+=`
            <div class="item">
                <b>${u.nombre}</b> (${u.rol})
                ${u.nombre!==currentUser.nombre?`
                <div style="margin-top:10px;">
                    <button onclick="mostrarCambioPass(${u.id})" 
                        style="background:var(--p);color:white;">
                        Cambiar contraseña
                    </button>
                    <button onclick="eliminarUsuario(${u.id})" 
                        style="background:var(--danger);color:white;margin-top:5px;">
                        Eliminar
                    </button>
                </div>
                <div id="pass-form-${u.id}" class="hidden">
                    <input type="password" id="new-pass-${u.id}" placeholder="Nueva contraseña">
                    <button onclick="cambiarPassword(${u.id})"
                        style="background:var(--success);color:white;">
                        Guardar
                    </button>
                </div>
                `:"(Tú)"}
            </div>`;
        });
    }

    if(currentUser.rol==='estudiante'){
        container.innerHTML="<h3>Tutorías Disponibles</h3>";
        cargarTutorias();
    }

    if(currentUser.rol==='docente'){
        container.innerHTML="<h3>Mis Tutorías</h3>";
        cargarTutorias();
    }
}

function mostrarCambioPass(id){
    document.getElementById(`pass-form-${id}`).classList.toggle('hidden');
}

async function cambiarPassword(id){
    const nueva=document.getElementById(`new-pass-${id}`).value;
    if(!nueva) return alert("Ingresa contraseña");

    await fetch(`/api/usuarios/${id}/password`,{
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({nuevaPassword:nueva})
    });

    alert("Contraseña actualizada");
    renderContent();
}

async function eliminarUsuario(id){
    await fetch(`/api/usuarios/${id}`,{method:'DELETE'});
    renderContent();
}

async function cargarTutorias(){
    const res=await fetch('/api/tutorias');
    const data=await res.json();
    const container=document.getElementById('content');

    data.forEach(t=>{
        container.innerHTML+=`
        <div class="item">
            <b>${t.materia}</b>
            <p>${t.fecha} ${t.hora}</p>
            ${currentUser.rol==='estudiante'?`
            <button onclick="aceptarTutoria(${t.id})"
                style="background:var(--success);color:white;">
                Inscribirse
            </button>`:""}
        </div>`;
    });
}

async function aceptarTutoria(id){
    const res=await fetch('/api/tutorias');
    const tutorias=await res.json();
    const t=tutorias.find(x=>x.id===id);

    const fechaTutoria=new Date(`${t.fecha}T${t.hora}`);
    if(new Date()>fechaTutoria){
        alert("⏰ El tiempo para seleccionar esta tutoría ha expirado.");
        return;
    }

    await fetch('/api/tutorias/aceptar',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({tutoriaId:id,alumnoNombre:currentUser.nombre})
    });

    renderContent();
}
</script>
</body>
</html>
